<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:system-ui,-apple-system,sans-serif;background:#f5ece0;color:#513C2C;font-size:14px;}
.app{max-width:680px;margin:0 auto;padding:16px 16px 80px;}
.page{display:none;}.page.active{display:block;}
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:680px;background:#fff8f0;border-top:1px solid #e8d8c4;display:flex;z-index:100;}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:10px 4px 8px;background:transparent;border:none;cursor:pointer;color:#a08870;font-size:11px;}
.nav-btn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;}

.card{background:#fff8f0;border:1px solid #e8d8c4;border-radius:14px;padding:16px 18px;margin-bottom:12px;}
.metric-row{display:grid;gap:10px;margin-bottom:12px;}
.metric-row-2{grid-template-columns:1fr 1fr;}
.metric{background:#513C2C;border-radius:10px;padding:12px 14px;}
.metric-label{font-size:11px;color:#d4b896;margin-bottom:4px;font-weight:500;text-transform:uppercase;letter-spacing:0.03em;}
.metric-value{font-size:17px;font-weight:700;color:#fff;}
.metric-growth{font-size:17px;font-weight:700;margin-top:4px;}
.growth-up{color:#c0392b;}.growth-down{color:#1a1a1a;}.growth-flat{color:#d4b896;}
.progress-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;}
.progress-title{font-size:15px;font-weight:700;color:#513C2C;}
.progress-pct{font-size:15px;color:#3d7a68;font-weight:700;}
.progress-bar-bg{height:9px;background:#e8d8c4;border-radius:99px;overflow:hidden;}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,#869D96,#5a8078);border-radius:99px;transition:width 0.6s ease;}
.progress-sub{font-size:12px;color:#8a6a52;margin-top:7px;}
.goal-row{margin-top:12px;display:flex;gap:8px;align-items:center;}
.goal-label{font-size:12px;color:#8a6a52;white-space:nowrap;font-weight:500;}
.goal-input{flex:1;font-size:13px;padding:5px 10px;height:34px;border-radius:8px;border:1px solid #d4b896;background:#f5ece0;color:#513C2C;font-weight:500;}

.chart-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.chart-title{font-size:14px;font-weight:700;color:#513C2C;}
.seg-ctrl{display:flex;gap:2px;background:#f0e0cc;border-radius:8px;padding:2px;}
.seg-btn{font-size:11px;padding:4px 9px;border:none;background:transparent;border-radius:6px;cursor:pointer;color:#8a6a52;font-weight:500;}
.seg-btn.active{background:#fff8f0;color:#513C2C;border:1px solid #d4b896;}
.filter-row{display:flex;align-items:center;gap:10px;margin-bottom:12px;}

.dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0;}
.data-table{width:100%;font-size:13px;border-collapse:collapse;}
.data-table th{text-align:left;color:#8a6a52;font-weight:500;padding:6px 8px;border-bottom:1px solid #ead8c4;font-size:12px;}

.entry-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}

.edit-row-top{display:grid;grid-template-columns:90px 1fr;gap:8px;margin-bottom:6px;}

.rm-btn{width:36px;height:36px;background:transparent;border:1px solid #e8c4b0;border-radius:8px;cursor:pointer;color:#c4a080;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.rm-btn:hover{color:#a0522d;border-color:#a0522d;}
.no-data{color:#b8a090;font-size:13px;padding:8px 0;text-align:center;}
.toast{display:none;border-radius:10px;padding:10px 16px;font-size:14px;text-align:center;margin-top:12px;font-weight:500;}
.toast.success{background:#869D96;color:#fff;}

.login-screen{position:fixed;inset:0;background:#f5ece0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:20px;}
.login-title{font-size:22px;font-weight:700;color:#513C2C;}
.login-sub{font-size:14px;color:#8a6a52;}
.login-status{font-size:13px;color:#8a6a52;margin-top:4px;}
.user-bar{display:flex;align-items:center;justify-content:space-between;background:#fff8f0;border:1px solid #e8d8c4;border-radius:10px;padding:8px 14px;margin-bottom:12px;}

.logout-btn{font-size:11px;padding:4px 10px;border:1px solid #d4b896;border-radius:6px;background:transparent;cursor:pointer;color:#7a5c42;}
</style>
</head>

<script>
const CLIENT_ID = '346174220725-h1cn0ruefm38n8ojf380frt99ts9k5oa.apps.googleusercontent.com';
const API_KEY = 'AIzaSyA6qx-nbS6VvgJeNqrlY9-7-n8zO1T8eI8';
const SHEET_ID = '1HjWo64vqHWG-RuDDVGZEf9BuSuImAPsWYO740BNDBqk';
const SCOPES = 'https://www.googleapis.com/auth/spreadsheets';
const BASE_URL = 'https://sheets.googleapis.com/v4/spreadsheets/' + SHEET_ID + '/values';

const MTW = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
const CATS = [
  {key:'liquid', label:'流動資產', color:'#869D96', desc:'收入、存款'},
  {key:'invest', label:'投資資產', color:'#513C2C', desc:'股票市值'},
  {key:'paid',   label:'已付帳款', color:'#a0522d', desc:'卡費、管理費'},
  {key:'unpaid', label:'未付帳款', color:'#c4935a', desc:''}
];
const COLORS = {liquid:'#869D96', invest:'#513C2C', paid:'#a0522d', unpaid:'#c4935a'};
const pastItems = {
  liquid:['子萱 - 中信存款','子萱 - 國泰存款','子萱 - 一銀存款','共同 - 國泰存款','佳韋 - 國泰存款','佳韋 - 郵局存款','佳韋 - 合庫存款','佳韋 - 兆豐存款'],
  invest:['子萱 - 0050','子萱 - 中信金','子萱 - 玉山金','佳韋 - 股票'],
  paid:['管理費','國泰信用卡費','聯邦信用卡費','好市多卡費'],
  unpaid:['國泰未出帳卡費','好市多未出帳','國泰日本卡費','好市多手機卡費','停車格租金']
};

var sampleData = {}, ALL_MONTHS = [], charts = {c1:null, c2:null}, ranges = {paid:3, invest:3};
var goalVal = parseInt(localStorage.getItem('goalVal')) || 2000000;
var accessToken = null, currentUser = null;
var activeCat = 'liquid', activeFormCat = 'liquid';
var editMode = {liquid:false, invest:false, paid:false, unpaid:false};
var editRows = {liquid:[], invest:[], paid:[], unpaid:[]};
var newRows = {liquid:[], invest:[], paid:[], unpaid:[]};

// Google 登入
function initGoogleLogin() {
  if (handleRedirectToken()) return;
  try {
    google.accounts.id.initialize({client_id: CLIENT_ID, callback: handleCredential, auto_select: false});
    google.accounts.id.renderButton(document.getElementById('g_id_signin'), {theme:'outline', size:'large', text:'signin_with', locale:'zh-TW', width:280});
  } catch(e) {
    document.getElementById('login-status').textContent = '登入元件載入失敗，請重新整理頁面';
  }
}

window.addEventListener('load', function() {
  var tries = 0;
  var timer = setInterval(function() {
    tries++;
    if (typeof google !== 'undefined' && google.accounts) {
      clearInterval(timer);
      initGoogleLogin();
    }
    if (tries > 30) {
      clearInterval(timer);
      document.getElementById('login-status').textContent = '載入逾時，請重新整理頁面';
    }
  }, 200);
});

function handleCredential(response) {
  var parts = response.credential.split('.');
  var payload = JSON.parse(atob(parts[1]));
  currentUser = {name: payload.name, email: payload.email};
  getAccessToken();
}

function getAccessToken() {
  document.getElementById('login-status').textContent = '授權中...';
  var params = new URLSearchParams({
    client_id: CLIENT_ID,
    redirect_uri: location.origin + location.pathname,
    response_type: 'token',
    scope: SCOPES,
    state: btoa(JSON.stringify(currentUser || {}))
  });
  location.href = 'https://accounts.google.com/o/oauth2/v2/auth?' + params.toString();
}

function handleRedirectToken() {
  var hash = new URLSearchParams(location.hash.slice(1));
  var token = hash.get('access_token');
  var state = hash.get('state');
  if (token) {
    accessToken = token;
    if (state) { try { currentUser = JSON.parse(atob(state)); } catch(e) {} }
    history.replaceState(null, '', location.pathname);
    onLoginSuccess();
    return true;
  }
  return false;
}

function onLoginSuccess() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('main-app').style.display = 'block';
  document.getElementById('bottom-nav').style.display = 'flex';
  document.getElementById('user-bar-wrap').innerHTML =
    '<div class="user-bar"><div class="user-info">👤 ' + (currentUser ? currentUser.name : '') + '（' + (currentUser ? currentUser.email : '') + '）</div><button class="logout-btn" onclick="logout()">登出</button></div>';
  loadAllData();
}

function logout() {
  google.accounts.id.disableAutoSelect();
  accessToken = null; currentUser = null;
  document.getElementById('main-app').style.display = 'none';
  document.getElementById('bottom-nav').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('login-status').textContent = '';
  initGoogleLogin();
}

// 資料讀取
async function fetchSheetData(name) {
  var res = await fetch(BASE_URL + '/' + name + '?key=' + API_KEY);
  if (!res.ok) throw new Error('無法讀取 ' + name);
  var json = await res.json();
  var rows = json.values || [];
  if (rows.length < 2) return [];
  var h = rows[0];
  return rows.slice(1).map(function(r) {
    var o = {};
    h.forEach(function(k, i) { o[k] = r[i] || ''; });
    return o;
  });
}

async function loadAllData() {
  try {
    var results = await Promise.all([
      fetchSheetData('liquid'), fetchSheetData('invest'),
      fetchSheetData('paid'), fetchSheetData('unpaid'),
      fetchSheetData('settings')
    ]);
    var liquid = results[0], invest = results[1], paid = results[2], unpaid = results[3], settings = results[4];
    var goalRow = settings.find(function(r) { return r.key === 'goalVal'; });
    if (goalRow && goalRow.value) goalVal = parseInt(goalRow.value) || 2000000;
    sampleData = {};
    function proc(rows, key) {
      rows.forEach(function(r) {
        var m = r.month; if (!m) return;
        if (!sampleData[m]) sampleData[m] = {liquid:[], invest:[], paid:[], unpaid:[]};
        sampleData[m][key].push({who: r.who, item: r.item, amt: +r.amt || 0});
      });
    }
    proc(liquid, 'liquid'); proc(invest, 'invest'); proc(paid, 'paid'); proc(unpaid, 'unpaid');
    ALL_MONTHS = Object.keys(sampleData).sort();
    updateDetailMonthSelector();
    renderCatTabs();
    renderFormCatTabs();
    refreshHomeSummary();
    renderDetail();
    rebuildC1(); rebuildC2();
  } catch(e) { console.error(e); }
}

// 資料寫入
async function appendToSheet(name, rows) {
  var res = await fetch('https://sheets.googleapis.com/v4/spreadsheets/' + SHEET_ID + '/values/' + name + ':append?valueInputOption=RAW&insertDataOption=INSERT_ROWS', {
    method: 'POST',
    headers: {'Content-Type': 'application/json', 'Authorization': 'Bearer ' + accessToken},
    body: JSON.stringify({values: rows.map(function(r) { return [r.month, r.who, r.item, r.amt]; })})
  });
  if (!res.ok) throw new Error('寫入 ' + name + ' 失敗');
}

async function saveGoalToSheet(v) {
  await fetch('https://sheets.googleapis.com/v4/spreadsheets/' + SHEET_ID + '/values/settings!B2?valueInputOption=RAW', {
    method: 'PUT',
    headers: {'Content-Type': 'application/json', 'Authorization': 'Bearer ' + accessToken},
    body: JSON.stringify({values: [[v]]})
  });
}

// 工具
function s(arr, k) { return (arr || []).reduce(function(a, b) { return a + (+b[k] || 0); }, 0); }
function fmt(n) { return '$' + Math.round(n).toLocaleString(); }
function mLabel(m) { var p = m.split('-'); return p[0] + '年' + MTW[+p[1]-1]; }
function getSurplus(m) { var d = sampleData[m] || {}; return s(d.liquid, 'amt') - s(d.unpaid, 'amt'); }
function getInvest(m) { return s((sampleData[m] || {}).invest, 'amt'); }
function prevMonth(m) { var i = ALL_MONTHS.indexOf(m); return i > 0 ? ALL_MONTHS[i-1] : null; }
function getInputMonth() {
  var y = document.getElementById('input-year').value;
  var mo = String(document.getElementById('input-mon').value).padStart(2, '0');
  return y + '-' + mo;
}

function growthTag(cur, prev) {
  if (prev === null || prev === undefined) return '<span class="growth-flat">— 無前月資料</span>';
  if (prev === 0) return '<span class="growth-flat">—</span>';
  var pct = (cur - prev) / prev * 100;
  var sign = pct >= 0 ? '+' : '';
  var cls = pct > 0 ? 'growth-up' : pct < 0 ? 'growth-down' : 'growth-flat';
  var arrow = pct > 0 ? '▲' : pct < 0 ? '▼' : '—';
  var diff = cur - prev;
  var diffStr = (diff >= 0 ? '+' : '') + fmt(diff);
  return '<span class="' + cls + '">' + arrow + ' ' + sign + Math.round(pct) + '% 較上月</span><br><span style="font-size:13px;font-weight:500;color:#d4b896;">' + diffStr + '</span>';
}

function growthTagDark(cur, prev) {
  if (prev === null || prev === undefined) return '<span style="color:#a08870;font-size:13px;font-weight:600;">— 無前月資料</span>';
  if (prev === 0) return '<span style="color:#a08870;font-size:13px;">—</span>';
  var pct = (cur - prev) / prev * 100;
  var sign = pct >= 0 ? '+' : '';
  var color = pct > 0 ? '#c0392b' : '#1a1a1a';
  var arrow = pct > 0 ? '▲' : '▼';
  var diff = cur - prev;
  var diffStr = (diff >= 0 ? '+' : '') + fmt(diff);
  return '<span style="color:' + color + ';font-size:13px;font-weight:600;">' + arrow + ' ' + sign + Math.round(pct) + '% 較上月</span> <span style="color:#7a5c42;font-size:12px;font-weight:500;">（' + diffStr + '）</span>';
}

function showToast(msg, type) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast ' + (type || 'success'); t.style.display = 'block';
  setTimeout(function() { t.style.display = 'none'; }, 3000);
}

// 首頁
function editGoal() {
  var inp = document.getElementById('goal-input');
  inp.value = goalVal; inp.type = 'number';
  inp.removeAttribute('readonly'); inp.classList.add('editing'); inp.focus();
  document.getElementById('goal-edit-btn').style.display = 'none';
  document.getElementById('goal-save-btn').style.display = 'block';
}
function saveGoal() {
  var inp = document.getElementById('goal-input');
  var v = +inp.value || goalVal; goalVal = v;
  localStorage.setItem('goalVal', v);
  inp.type = 'text'; inp.value = v.toLocaleString();
  inp.setAttribute('readonly', ''); inp.classList.remove('editing');
  document.getElementById('goal-edit-btn').style.display = 'block';
  document.getElementById('goal-save-btn').style.display = 'none';
  document.getElementById('target-asset').textContent = fmt(goalVal);
  refreshHomeSummary();
  if (accessToken) saveGoalToSheet(v).catch(function(e) { console.error(e); });
}
function refreshHomeSummary() {
  document.getElementById('goal-input').value = goalVal.toLocaleString();
  document.getElementById('target-asset').textContent = fmt(goalVal);
  if (!ALL_MONTHS.length) return;
  var latest = ALL_MONTHS[ALL_MONTHS.length-1], prev = prevMonth(latest);
  var curS = getSurplus(latest), prevS = prev ? getSurplus(prev) : null;
  var curI = getInvest(latest), prevI = prev ? getInvest(prev) : null;
  var pct = Math.min(100, Math.round(curS / goalVal * 100));
  document.getElementById('pct-label').textContent = pct + '%';
  document.getElementById('prog-bar').style.width = pct + '%';
  document.getElementById('cur-surplus').textContent = fmt(curS);
  document.getElementById('m-surplus').textContent = fmt(curS);
  document.getElementById('m-surplus-growth').innerHTML = growthTag(curS, prevS);
  document.getElementById('m-invest').textContent = fmt(curI);
  document.getElementById('m-invest-growth').innerHTML = growthTag(curI, prevI);
}

// 圖表
function setRange(type, n) {
  ranges[type] = n;
  document.querySelectorAll('#seg-' + type + ' .seg-btn').forEach(function(b, i) {
    b.classList.toggle('active', [3,6,12][i] === n);
  });
  if (type === 'paid') rebuildC1(); else rebuildC2();
}
function getMonths(n) {
  var sorted = ALL_MONTHS.slice().sort();
  var e = sorted.length - 1, st = Math.max(0, e - n + 1);
  return sorted.slice(st, e + 1);
}
function rebuildC1() {
  if (charts.c1) charts.c1.destroy();
  var months = getMonths(ranges.paid), labels = months.map(mLabel);
  var paid = months.map(function(m) { return s((sampleData[m] || {}).paid, 'amt'); });
  charts.c1 = new Chart(document.getElementById('c1'), {
    type: 'bar',
    data: {labels: labels, datasets: [{data: paid, backgroundColor: 'rgba(160,82,45,0.7)', borderRadius: 6, borderSkipped: false}]},
    options: {responsive: true, maintainAspectRatio: false, plugins: {legend: {display: false}}, scales: {
      y: {ticks: {callback: function(v) { return '$' + (v/10000).toFixed(0) + '萬'; }, font: {size:11}, color:'#8a6a52'}, grid: {color:'rgba(81,60,44,0.06)'}, beginAtZero: true, border: {display:false}},
      x: {ticks: {font: {size:11}, color:'#8a6a52', autoSkip: false, maxRotation: 45}, grid: {display:false}, border: {display:false}}
    }}
  });
}
function rebuildC2() {
  if (charts.c2) charts.c2.destroy();
  var months = getMonths(ranges.invest), labels = months.map(mLabel);
  var invest = months.map(function(m) { return s((sampleData[m] || {}).invest, 'amt'); });
  charts.c2 = new Chart(document.getElementById('c2'), {
    type: 'line',
    data: {labels: labels, datasets: [{data: invest, borderColor: '#869D96', backgroundColor: 'rgba(134,157,150,0.1)', tension: 0.4, fill: true, borderWidth: 2.5, pointRadius: 4, pointBackgroundColor: '#869D96'}]},
    options: {responsive: true, maintainAspectRatio: false, plugins: {legend: {display: false}}, scales: {
      y: {ticks: {callback: function(v) { return '$' + (v/10000).toFixed(0) + '萬'; }, font: {size:11}, color:'#8a6a52'}, grid: {color:'rgba(81,60,44,0.06)'}, border: {display:false}},
      x: {ticks: {font: {size:11}, color:'#8a6a52', autoSkip: false, maxRotation: 45}, grid: {display:false}, border: {display:false}}
    }}
  });
}

// 分頁切換
function switchTab(i) {
  [0,1,2].forEach(function(j) {
    document.getElementById('page'+j).classList.toggle('active', j === i);
    document.getElementById('nav'+j).classList.toggle('active', j === i);
  });
  if (i === 1) renderDetail();
  if (i === 2) renderFormCat();
}

// 明細表
function updateDetailMonthSelector() {
  document.getElementById('detail-month').innerHTML = ALL_MONTHS.slice().reverse().map(function(m) {
    return '<option value="' + m + '">' + mLabel(m) + '</option>';
  }).join('');
}
function renderCatTabs() {
  document.getElementById('cat-tabs').innerHTML = CATS.map(function(c) {
    var isActive = activeCat === c.key;
    return '<button class="cat-tab' + (isActive ? ' active' : '') + '" style="' + (isActive ? 'background:' + c.color + ';color:#fff8f0;border-color:transparent;' : '') + '" onclick="switchCat(\'' + c.key + '\')">' + c.label + '</button>';
  }).join('');
}
function switchCat(key) { activeCat = key; renderCatTabs(); renderDetail(); }

function renderDetail() {
  var m = document.getElementById('detail-month').value;
  if (!m || !sampleData[m]) return;
  var prev = prevMonth(m), d = sampleData[m], dp = prev && sampleData[prev] ? sampleData[prev] : {};
  var c = CATS.find(function(x) { return x.key === activeCat; });
  var rows = d[c.key] || [], total = s(rows, 'amt');
  var ptotal = prev ? s((dp[c.key] || []), 'amt') : null;
  var html = '<div class="card"><div class="section-header"><span class="dot" style="background:' + c.color + '"></span>' + c.label + (c.desc ? '（' + c.desc + '）' : '') + '</div>';
  html += '<table class="data-table"><thead><tr><th>負責人</th><th>項目</th><th style="text-align:right">金額</th></tr></thead><tbody>';
  if (!rows.length) html += '<tr><td colspan="3" style="color:#b8a090;font-size:12px;padding:8px;text-align:center;">尚無資料</td></tr>';
  rows.forEach(function(r) { html += '<tr><td>' + r.who + '</td><td>' + r.item + '</td><td class="amount">' + fmt(r.amt) + '</td></tr>'; });
  html += '</tbody></table><div class="section-total"><span>合計</span><strong>' + fmt(total) + '</strong></div>';
  html += '<div style="text-align:right;margin-top:6px;">' + growthTagDark(total, ptotal) + '</div></div>';
  document.getElementById('detail-content').innerHTML = html;
}

// 每月記帳
function renderFormCatTabs() {
  document.getElementById('form-cat-tabs').innerHTML = CATS.map(function(c) {
    var isActive = activeFormCat === c.key;
    return '<button class="cat-tab' + (isActive ? ' active' : '') + '" style="' + (isActive ? 'background:' + c.color + ';color:#fff8f0;border-color:transparent;' : '') + '" onclick="switchFormCat(\'' + c.key + '\')">' + c.label + '</button>';
  }).join('');
}
function switchFormCat(key) {
  activeFormCat = key;
  editMode[key] = false;
  newRows[key] = [];
  renderFormCatTabs();
  renderFormCat();
}

function renderFormCat() {
  var key = activeFormCat;
  var c = CATS.find(function(x) { return x.key === key; });
  var m = getInputMonth();
  var existing = (sampleData[m] || {})[key] || [];
  var isEdit = editMode[key];
  var existingHtml = '';

  if (!existing.length) {
    existingHtml = '<p class="no-data">本月尚無資料</p>';
  } else if (isEdit) {
    existingHtml = editRows[key].map(function(r, i) {
      var opts = pastItems[key].map(function(x) { return '<option value="' + x + '">'; }).join('');
      return '<div class="edit-row"><div class="edit-row-top">' +
        '<select onchange="editRows[\'' + key + '\'][' + i + '].who=this.value">' +
        '<option value="子萱"' + (r.who==='子萱'?' selected':'') + '>子萱</option>' +
        '<option value="佳韋"' + (r.who==='佳韋'?' selected':'') + '>佳韋</option>' +
        '<option value="共同"' + (r.who==='共同'?' selected':'') + '>共同</option></select>' +
        '<input list="el-' + key + '-' + i + '" placeholder="項目" value="' + r.item + '" oninput="editRows[\'' + key + '\'][' + i + '].item=this.value">' +
        '<datalist id="el-' + key + '-' + i + '">' + opts + '</datalist></div>' +
        '<div class="edit-row-bot"><input type="number" placeholder="金額" value="' + r.amt + '" oninput="editRows[\'' + key + '\'][' + i + '].amt=this.value">' +
        '<button class="rm-btn" onclick="removeEditRow(\'' + key + '\',' + i + ')">✕</button></div></div>';
    }).join('');
  } else {
    existingHtml = existing.map(function(r) {
      return '<div class="entry-row"><span class="entry-who">' + r.who + '</span><span class="entry-item">' + r.item + '</span><span class="entry-amt">' + fmt(r.amt) + '</span></div>';
    }).join('');
  }

  var newHtml = '';
  if (newRows[key].length) {
    newHtml = '<div class="new-section">' + newRows[key].map(function(r, i) {
      var opts = pastItems[key].map(function(x) { return '<option value="' + x + '">'; }).join('');
      return '<div class="edit-row"><div class="edit-row-top">' +
        '<select onchange="newRows[\'' + key + '\'][' + i + '].who=this.value">' +
        '<option value="子萱"' + (r.who==='子萱'?' selected':'') + '>子萱</option>' +
        '<option value="佳韋"' + (r.who==='佳韋'?' selected':'') + '>佳韋</option>' +
        '<option value="共同"' + (r.who==='共同'?' selected':'') + '>共同</option></select>' +
        '<input list="nl-' + key + '-' + i + '" placeholder="項目" value="' + r.item + '" oninput="newRows[\'' + key + '\'][' + i + '].item=this.value">' +
        '<datalist id="nl-' + key + '-' + i + '">' + opts + '</datalist></div>' +
        '<div class="edit-row-bot"><input type="number" placeholder="金額" value="' + r.amt + '" oninput="newRows[\'' + key + '\'][' + i + '].amt=this.value">' +
        '<button class="rm-btn" onclick="removeNewRow(\'' + key + '\',' + i + ')">✕</button></div></div>';
    }).join('') + '</div>';
  }

  var showSave = isEdit || newRows[key].length > 0;
  document.getElementById('form-cat-content').innerHTML =
    '<div class="entry-card"><div class="entry-header">' +
    '<div class="entry-title"><span class="dot" style="background:' + c.color + '"></span>' + c.label + '</div>' +
    '<div>' + (existing.length ? '<button class="edit-btn" onclick="toggleEdit(\'' + key + '\')">' + (isEdit ? '取消' : '✎ 編輯') + '</button>' : '') + '</div></div>' +
    existingHtml + newHtml +
    '<button class="add-row-btn" onclick="addNewRow(\'' + key + '\')">＋ 新增一筆</button>' +
    (showSave ? '<button class="save-cat-btn" onclick="saveAll(\'' + key + '\')">儲存</button>' : '') +
    '</div>';
}

function toggleEdit(key) {
  var m = getInputMonth();
  var existing = (sampleData[m] || {})[key] || [];
  if (!editMode[key]) editRows[key] = existing.map(function(r) { return {who:r.who, item:r.item, amt:r.amt}; });
  editMode[key] = !editMode[key];
  renderFormCat();
}
function removeEditRow(key, i) { editRows[key].splice(i, 1); renderFormCat(); }
function addNewRow(key) { newRows[key].push({who:'子萱', item:'', amt:''}); renderFormCat(); }
function removeNewRow(key, i) { newRows[key].splice(i, 1); renderFormCat(); }

async function saveAll(key) {
  if (!accessToken) { showToast('請先登入', 'error'); return; }
  var m = getInputMonth();
  try {
    var validNew = newRows[key].filter(function(r) { return r.item && r.amt; }).map(function(r) {
      return {month:m, who:r.who, item:r.item, amt:r.amt};
    });
    if (validNew.length) await appendToSheet(key, validNew);
    if (!sampleData[m]) sampleData[m] = {liquid:[], invest:[], paid:[], unpaid:[]};
    if (editMode[key]) sampleData[m][key] = editRows[key].filter(function(r) { return r.item; });
    if (validNew.length) sampleData[m][key] = (sampleData[m][key] || []).concat(validNew);
    editMode[key] = false; newRows[key] = [];
    if (ALL_MONTHS.indexOf(m) === -1) { ALL_MONTHS.push(m); ALL_MONTHS.sort(); }
    showToast('✓ 儲存成功！');
    renderFormCat();
    refreshHomeSummary();
    rebuildC1(); rebuildC2();
  } catch(e) {
    showToast('❌ 儲存失敗：' + e.message, 'error');
  }
}
</script>
