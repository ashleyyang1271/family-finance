<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>家庭財務總覽</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:system-ui,-apple-system,sans-serif;background:#f5ece0;color:#513C2C;font-size:14px;}
.app{max-width:680px;margin:0 auto;padding:16px 16px 80px;}
.page{display:none;}.page.active{display:block;}
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:680px;background:#fff8f0;border-top:1px solid #e8d8c4;display:flex;z-index:100;}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:10px 4px 8px;background:transparent;border:none;cursor:pointer;color:#a08870;font-size:11px;}
.nav-btn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;}
.nav-btn.active{color:#513C2C;font-weight:500;}
.card{background:#fff8f0;border:1px solid #e8d8c4;border-radius:14px;padding:16px 18px;margin-bottom:12px;}
.metric-row{display:grid;gap:10px;margin-bottom:12px;}
.metric-row-2{grid-template-columns:1fr 1fr;}.metric-row-3{grid-template-columns:repeat(3,1fr);}
.metric{background:#513C2C;border-radius:10px;padding:12px 14px;}
.metric-label{font-size:11px;color:#d4b896;margin-bottom:4px;font-weight:500;text-transform:uppercase;letter-spacing:0.03em;}
.metric-value{font-size:17px;font-weight:700;color:#ffffff;}
.metric-growth{font-size:11px;margin-top:4px;color:#ffffff;}
.growth-up{color:#ffffff;}.growth-down{color:#ffffff;}.growth-flat{color:#ffffff;}
.section-header{font-size:13px;font-weight:700;color:#7a5c42;margin-bottom:10px;display:flex;align-items:center;gap:6px;text-transform:uppercase;letter-spacing:0.04em;}
.progress-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;}
.progress-title{font-size:15px;font-weight:700;color:#513C2C;}
.progress-pct{font-size:15px;color:#3d7a68;font-weight:700;}
.progress-bar-bg{height:9px;background:#e8d8c4;border-radius:99px;overflow:hidden;}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,#869D96,#5a8078);border-radius:99px;transition:width 0.6s ease;}
.progress-sub{font-size:12px;color:#8a6a52;margin-top:7px;}
.goal-row{margin-top:12px;display:flex;gap:8px;align-items:center;}
.goal-label{font-size:12px;color:#8a6a52;white-space:nowrap;font-weight:500;}
.goal-input{flex:1;font-size:13px;padding:5px 10px;height:34px;border-radius:8px;border:1px solid #d4b896;background:#f5ece0;color:#513C2C;font-weight:500;}
.goal-input.editing{background:#fff;border-color:#869D96;outline:none;}
.goal-btn{height:34px;padding:0 14px;font-size:12px;border:1px solid #d4b896;border-radius:8px;background:transparent;cursor:pointer;color:#7a5c42;white-space:nowrap;font-weight:500;}
.goal-btn:hover{background:#f0e0cc;}
.goal-btn.save{background:#869D96;color:#fff;border-color:#869D96;}
.chart-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.chart-title{font-size:14px;font-weight:700;color:#513C2C;}
.seg-ctrl{display:flex;gap:2px;background:#f0e0cc;border-radius:8px;padding:2px;}
.seg-btn{font-size:11px;padding:4px 9px;border:none;background:transparent;border-radius:6px;cursor:pointer;color:#8a6a52;font-weight:500;}
.seg-btn.active{background:#fff8f0;color:#513C2C;border:1px solid #d4b896;}
.chart-wrap{position:relative;width:100%;}
.filter-row{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.filter-row select{font-size:13px;padding:6px 10px;border-radius:8px;border:1px solid #d4b896;background:#fff8f0;color:#513C2C;}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0;}
.data-table{width:100%;font-size:13px;border-collapse:collapse;}
.data-table th{text-align:left;color:#8a6a52;font-weight:500;padding:6px 8px;border-bottom:1px solid #ead8c4;font-size:12px;}
.data-table td{padding:8px 8px;color:#513C2C;border-bottom:1px solid #f0e4d4;}
.data-table tr:last-child td{border-bottom:none;}
.data-table .amount{text-align:right;font-weight:600;}
.section-total{display:flex;justify-content:space-between;align-items:center;background:#513C2C;border-radius:8px;padding:10px 14px;margin-top:10px;}
.section-total span{font-size:12px;color:#d4b896;font-weight:500;}
.section-total strong{font-size:16px;color:#ffffff;font-weight:700;}
.form-row{display:grid;grid-template-columns:1fr 1.5fr 1fr auto;gap:8px;align-items:center;margin-bottom:8px;}
.form-row input,.form-row select{font-size:13px;padding:5px 8px;height:34px;border:1px solid #d4b896;border-radius:8px;background:#fff8f0;color:#513C2C;}
.add-btn{background:transparent;border:1px solid #d4b896;border-radius:8px;padding:6px 12px;cursor:pointer;font-size:13px;color:#7a5c42;font-weight:500;}
.add-btn:hover{background:#f0e0cc;}
.rm-btn{background:transparent;border:none;cursor:pointer;color:#c4a080;padding:4px;font-size:16px;}
.rm-btn:hover{color:#a0522d;}
.save-btn{background:#513C2C;color:#fff8f0;border:none;border-radius:10px;padding:12px 24px;font-size:14px;cursor:pointer;width:100%;margin-top:8px;font-weight:600;}
.save-btn:hover{background:#3d2c1e;}
.save-btn:disabled{background:#a08870;cursor:not-allowed;}
.month-select-row{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.month-select-row label{font-size:14px;color:#8a6a52;font-weight:500;}
.month-select-row select{font-size:13px;padding:6px 10px;border-radius:8px;border:1px solid #d4b896;background:#fff8f0;color:#513C2C;}
.toast{display:none;border-radius:10px;padding:10px 16px;font-size:14px;text-align:center;margin-top:12px;font-weight:500;}
.toast.success{background:#869D96;color:#fff;}
.toast.error{background:#a0522d;color:#fff;}

/* 登入畫面 */
.login-screen{position:fixed;inset:0;background:#f5ece0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:20px;}
.login-title{font-size:22px;font-weight:700;color:#513C2C;}
.login-sub{font-size:14px;color:#8a6a52;}
.login-status{font-size:13px;color:#8a6a52;margin-top:8px;}
.user-bar{display:flex;align-items:center;justify-content:space-between;background:#fff8f0;border:1px solid #e8d8c4;border-radius:10px;padding:8px 14px;margin-bottom:12px;}
.user-info{font-size:12px;color:#8a6a52;}
.logout-btn{font-size:11px;padding:4px 10px;border:1px solid #d4b896;border-radius:6px;background:transparent;cursor:pointer;color:#7a5c42;}
</style>
</head>
<body>

<!-- 登入畫面 -->

<div class="app" id="main-app" style="display:none;">

    <div class="card">

          <button class="seg-btn active" onclick="setRange('invest',3)">近3月</button>

        <option value="2026">2026</option><option value="2027">2027</option><option value="2028">2028</option><option value="2029">2029</option><option value="2030">2030</option><option value="2031">2031</option><option value="2032">2032</option><option value="2033">2033</option><option value="2034">2034</option><option value="2035">2035</option><option value="2036">2036</option><option value="2037">2037</option><option value="2038">2038</option><option value="2039">2039</option><option value="2040">2040</option><option value="2041">2041</option><option value="2042">2042</option><option value="2043">2043</option><option value="2044">2044</option><option value="2045">2045</option><option value="2046">2046</option>
      </select>
      <span style="color:#8a6a52;">年</span>

        <option value="1">1月</option><option value="2">2月</option><option value="3">3月</option><option value="4">4月</option><option value="5" selected>5月</option><option value="6">6月</option><option value="7">7月</option><option value="8">8月</option><option value="9">9月</option><option value="10">10月</option><option value="11">11月</option><option value="12">12月</option>
      </select>
    </div>
    <div id="form-sections"></div>

</div>

<div class="bottom-nav" id="bottom-nav" style="display:none;">
  <button class="nav-btn active" id="nav0" onclick="switchTab(0)">
    <svg viewBox="0 0 24 24"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>首頁
  </button>
  <button class="nav-btn" id="nav1" onclick="switchTab(1)">
    <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M7 8h10M7 12h10M7 16h6"/></svg>明細表
  </button>
  <button class="nav-btn" id="nav2" onclick="switchTab(2)">
    <svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>每月記帳
  </button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const CLIENT_ID='346174220725-h1cn0ruefm38n8ojf380frt99ts9k5oa.apps.googleusercontent.com';
const API_KEY='AIzaSyA6qx-nbS6VvgJeNqrlY9-7-n8zO1T8eI8';
const SHEET_ID='1HjWo64vqHWG-RuDDVGZEf9BuSuImAPsWYO740BNDBqk';
const SCOPES='https://www.googleapis.com/auth/spreadsheets';
const BASE_URL=`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values`;

const MTW=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
const CATS=[
  {key:'liquid',label:'流動資產',color:'#869D96',desc:'收入、存款'},
  {key:'invest',label:'投資資產',color:'#513C2C',desc:'股票市值'},
  {key:'paid',label:'已付帳款',color:'#a0522d',desc:'卡費、管理費'},
  {key:'unpaid',label:'未付帳款',color:'#c4935a',desc:''}
];
const pastItems={
  liquid:['子萱 - 中信存款','子萱 - 國泰存款','子萱 - 一銀存款','共同 - 國泰存款','佳韋 - 國泰存款','佳韋 - 郵局存款','佳韋 - 合庫存款','佳韋 - 兆豐存款'],
  invest:['子萱 - 0050','子萱 - 中信金','子萱 - 玉山金','佳韋 - 股票'],
  paid:['管理費','國泰信用卡費','聯邦信用卡費','好市多卡費'],
  unpaid:['國泰未出帳卡費','好市多未出帳','國泰日本卡費','好市多手機卡費','停車格租金']
};

let sampleData={}, ALL_MONTHS=[], charts={c1:null,c2:null}, ranges={paid:3,invest:3};
let goalVal=parseInt(localStorage.getItem('goalVal'))||3000000;
let accessToken=null, currentUser=null;

// ── Google Identity Services ──
window.onGoogleLibraryLoad=()=>{
  // 先檢查是否從 OAuth redirect 回來
  if(handleRedirectToken()) return;

  google.accounts.id.initialize({
    client_id: CLIENT_ID,
    callback: handleCredential,
    auto_select: true
  });
  google.accounts.id.renderButton(
    document.getElementById('g_id_signin'),
    {theme:'outline', size:'large', text:'signin_with', locale:'zh-TW'}
  );
  google.accounts.id.prompt();
};

function handleCredential(response){
  const payload=JSON.parse(atob(response.credential.split('.')[1]));
  currentUser={name:payload.name, email:payload.email};
  getAccessToken();
}

function getAccessToken(){
  document.getElementById('login-status').textContent='授權中...';
  // 偵測是否為 PWA / 手機模式
  const isPWA=window.matchMedia('(display-mode: standalone)').matches||window.navigator.standalone;
  if(isPWA){
    // 用 redirect 模式
    const params=new URLSearchParams({
      client_id: CLIENT_ID,
      redirect_uri: location.origin+location.pathname,
      response_type: 'token',
      scope: SCOPES,
      state: btoa(JSON.stringify(currentUser))
    });
    location.href='https://accounts.google.com/o/oauth2/v2/auth?'+params.toString();
  } else {
    // 桌面用彈出視窗模式
    const client=google.accounts.oauth2.initTokenClient({
      client_id: CLIENT_ID,
      scope: SCOPES,
      callback:(resp)=>{
        if(resp.error){
          document.getElementById('login-status').textContent='授權失敗，請重試';
          return;
        }
        accessToken=resp.access_token;
        onLoginSuccess();
      }
    });
    client.requestAccessToken();
  }
}

// 處理 redirect 回來後的 token
function handleRedirectToken(){
  const hash=new URLSearchParams(location.hash.slice(1));
  const token=hash.get('access_token');
  const state=hash.get('state');
  if(token){
    accessToken=token;
    if(state){ try{ currentUser=JSON.parse(atob(state)); }catch(e){} }
    // 清除網址上的 token
    history.replaceState(null,'',location.pathname);
    onLoginSuccess();
    return true;
  }
  return false;
}

function onLoginSuccess(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('main-app').style.display='block';
  document.getElementById('bottom-nav').style.display='flex';
  document.getElementById('user-bar-wrap').innerHTML=`
    <div class="user-bar">
      <div class="user-info">👤 ${currentUser.name}（${currentUser.email}）</div>
      <button class="logout-btn" onclick="logout()">登出</button>
    </div>`;
  loadAllData();
}

function logout(){
  google.accounts.id.disableAutoSelect();
  accessToken=null; currentUser=null;
  document.getElementById('main-app').style.display='none';
  document.getElementById('bottom-nav').style.display='none';
  document.getElementById('login-screen').style.display='flex';
}

// ── 資料讀取 ──
async function fetchSheetData(sheetName){
  const url=`${BASE_URL}/${sheetName}?key=${API_KEY}`;
  const res=await fetch(url);
  if(!res.ok) throw new Error(`無法讀取 ${sheetName}`);
  const json=await res.json();
  const rows=json.values||[];
  if(rows.length<2) return [];
  const headers=rows[0];
  return rows.slice(1).map(r=>{let o={};headers.forEach((h,i)=>o[h]=r[i]||'');return o;});
}

async function loadAllData(){
  try{
    const [liquid,invest,paid,unpaid]=await Promise.all([
      fetchSheetData('liquid'),fetchSheetData('invest'),
      fetchSheetData('paid'),fetchSheetData('unpaid')
    ]);
    sampleData={};
    const process=(rows,key)=>rows.forEach(r=>{
      let m=r.month; if(!m) return;
      if(!sampleData[m]) sampleData[m]={liquid:[],invest:[],paid:[],unpaid:[]};
      sampleData[m][key].push({who:r.who,item:r.item,amt:+r.amt||0});
    });
    process(liquid,'liquid'); process(invest,'invest');
    process(paid,'paid'); process(unpaid,'unpaid');
    ALL_MONTHS=Object.keys(sampleData).sort();
    updateDetailMonthSelector();
    refreshHomeSummary();
    renderDetail();
    rebuildC1(); rebuildC2();
  }catch(e){
    console.error(e);
  }
}

// ── 資料寫入 ──
async function appendToSheet(sheetName, rows){
  const url=`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${sheetName}:append?valueInputOption=RAW&insertDataOption=INSERT_ROWS`;
  const values=rows.map(r=>[r.month,r.who,r.item,r.amt]);
  const res=await fetch(url,{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':`Bearer ${accessToken}`},
    body:JSON.stringify({values})
  });
  if(!res.ok) throw new Error(`寫入 ${sheetName} 失敗`);
}

// ── 工具函式 ──
function s(arr,k){return (arr||[]).reduce((a,b)=>a+(+b[k]||0),0);}
function fmt(n){return '$'+Math.round(n).toLocaleString();}
function mLabel(m){let p=m.split('-');return p[0]+'年'+MTW[+p[1]-1];}
function getSurplus(m){let d=sampleData[m]||{};return s(d.liquid,'amt')-s(d.unpaid,'amt');}
function getInvest(m){return s((sampleData[m]||{}).invest,'amt');}
function prevMonth(m){let i=ALL_MONTHS.indexOf(m);return i>0?ALL_MONTHS[i-1]:null;}

function growthTag(cur,prev){
  if(prev===null||prev===undefined)return '<span class="growth-flat">— 無前月資料</span>';
  if(prev===0)return '<span class="growth-flat">—</span>';
  let pct=(cur-prev)/prev*100,sign=pct>=0?'+':'';
  let cls=pct>0?'growth-up':pct<0?'growth-down':'growth-flat';
  let arrow=pct>0?'▲':pct<0?'▼':'—';
  return `<span class="${cls}">${arrow} ${sign}${Math.round(pct)}% 較上月</span>`;
}
function growthTagDark(cur,prev){
  if(prev===null||prev===undefined)return '<span style="color:#a08870;font-size:13px;font-weight:500;">— 無前月資料</span>';
  if(prev===0)return '<span style="color:#a08870;font-size:13px;">—</span>';
  let pct=(cur-prev)/prev*100,sign=pct>=0?'+':'';
  let color=pct>0?'#3d7a68':pct<0?'#a0522d':'#7a5c42';
  let arrow=pct>0?'▲':pct<0?'▼':'—';
  return `<span style="color:${color};font-size:13px;font-weight:500;">${arrow} ${sign}${Math.round(pct)}% 較上月</span>`;
}

// ── 首頁 ──
function editGoal(){
  let inp=document.getElementById('goal-input');
  inp.value=goalVal; inp.type='number';
  inp.removeAttribute('readonly'); inp.classList.add('editing'); inp.focus();
  document.getElementById('goal-edit-btn').style.display='none';
  document.getElementById('goal-save-btn').style.display='block';
}
function saveGoal(){
  let inp=document.getElementById('goal-input');
  let v=+inp.value||goalVal; goalVal=v;
  localStorage.setItem('goalVal',v);
  inp.type='text'; inp.value=v.toLocaleString();
  inp.setAttribute('readonly',''); inp.classList.remove('editing');
  document.getElementById('goal-edit-btn').style.display='block';
  document.getElementById('goal-save-btn').style.display='none';
  document.getElementById('target-asset').textContent=fmt(goalVal);
  refreshHomeSummary();
}
function refreshHomeSummary(){
  document.getElementById('goal-input').value=goalVal.toLocaleString();
  document.getElementById('target-asset').textContent=fmt(goalVal);
  if(!ALL_MONTHS.length) return;
  let latest=ALL_MONTHS[ALL_MONTHS.length-1], prev=prevMonth(latest);
  let curS=getSurplus(latest), prevS=prev?getSurplus(prev):null;
  let curI=getInvest(latest), prevI=prev?getInvest(prev):null;
  let pct=Math.min(100,Math.round(curS/goalVal*100));
  document.getElementById('pct-label').textContent=pct+'%';
  document.getElementById('prog-bar').style.width=pct+'%';
  document.getElementById('cur-surplus').textContent=fmt(curS);
  document.getElementById('m-surplus').textContent=fmt(curS);
  document.getElementById('m-surplus-growth').innerHTML=growthTag(curS,prevS);
  document.getElementById('m-invest').textContent=fmt(curI);
  document.getElementById('m-invest-growth').innerHTML=growthTag(curI,prevI);
}

// ── 圖表 ──
function setRange(type,n){
  ranges[type]=n;
  document.querySelectorAll('#seg-'+type+' .seg-btn').forEach((b,i)=>{b.classList.toggle('active',[3,6,12][i]===n);});
  if(type==='paid')rebuildC1(); else rebuildC2();
}
function getMonths(n){let e=ALL_MONTHS.length-1,st=Math.max(0,e-n+1);return ALL_MONTHS.slice(st,e+1);}
function rebuildC1(){
  if(charts.c1)charts.c1.destroy();
  let months=getMonths(ranges.paid),labels=months.map(mLabel);
  let paid=months.map(m=>s((sampleData[m]||{}).paid,'amt'));
  charts.c1=new Chart(document.getElementById('c1'),{
    type:'bar',
    data:{labels,datasets:[{label:'已付帳款',data:paid,backgroundColor:'rgba(160,82,45,0.7)',borderRadius:6,borderSkipped:false}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{
      y:{ticks:{callback:v=>'$'+(v/10000).toFixed(0)+'萬',font:{size:11},color:'#8a6a52'},grid:{color:'rgba(81,60,44,0.06)'},beginAtZero:true,border:{display:false}},
      x:{ticks:{font:{size:11},color:'#8a6a52',autoSkip:false},grid:{display:false},border:{display:false}}
    }}
  });
}
function rebuildC2(){
  if(charts.c2)charts.c2.destroy();
  let months=getMonths(ranges.invest),labels=months.map(mLabel);
  let invest=months.map(m=>s((sampleData[m]||{}).invest,'amt'));
  charts.c2=new Chart(document.getElementById('c2'),{
    type:'line',
    data:{labels,datasets:[{label:'股票市值',data:invest,borderColor:'#869D96',backgroundColor:'rgba(134,157,150,0.1)',tension:0.4,fill:true,borderWidth:2.5,pointRadius:5,pointBackgroundColor:'#869D96'}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{
      y:{ticks:{callback:v=>'$'+(v/10000).toFixed(0)+'萬',font:{size:11},color:'#8a6a52'},grid:{color:'rgba(81,60,44,0.06)'},border:{display:false}},
      x:{ticks:{font:{size:11},color:'#8a6a52',autoSkip:false},grid:{display:false},border:{display:false}}
    }}
  });
}

// ── 分頁切換 ──
function switchTab(i){
  [0,1,2].forEach(j=>{
    document.getElementById('page'+j).classList.toggle('active',j===i);
    document.getElementById('nav'+j).classList.toggle('active',j===i);
  });
  if(i===1)renderDetail();
  if(i===2)renderForm();
}

// ── 明細表 ──
function updateDetailMonthSelector(){
  let opts=ALL_MONTHS.slice().reverse().map(m=>`<option value="${m}">${mLabel(m)}</option>`).join('');
  document.getElementById('detail-month').innerHTML=opts;
}
function renderDetail(){
  let m=document.getElementById('detail-month').value;
  if(!m||!sampleData[m]) return;
  let prev=prevMonth(m);
  let d=sampleData[m], dp=prev&&sampleData[prev]?sampleData[prev]:{};
  let liq=s(d.liquid,'amt'), inv=s(d.invest,'amt'), exp=s(d.paid,'amt')+s(d.unpaid,'amt');
  let pliq=prev?s(dp.liquid,'amt'):null, pinv=prev?s(dp.invest,'amt'):null, pexp=prev?s(dp.paid,'amt')+s(dp.unpaid,'amt'):null;
  document.getElementById('detail-metrics').innerHTML=`
    <div class="metric"><div class="metric-label">存款</div><div class="metric-value">${fmt(liq)}</div><div class="metric-growth">${growthTag(liq,pliq)}</div></div>
    <div class="metric"><div class="metric-label">投資資產</div><div class="metric-value">${fmt(inv)}</div><div class="metric-growth">${growthTag(inv,pinv)}</div></div>
    <div class="metric"><div class="metric-label">花費（已付＋未付）</div><div class="metric-value">${fmt(exp)}</div><div class="metric-growth">${growthTag(exp,pexp)}</div></div>`;
  let html='';
  CATS.forEach(c=>{
    let rows=d[c.key]||[], total=s(rows,'amt');
    let ptotal=prev?s((dp[c.key]||[]),'amt'):null;
    html+=`<div class="card">
      <div class="section-header"><span class="dot" style="background:${c.color}"></span>${c.label}${c.desc?'（'+c.desc+'）':''}</div>
      <table class="data-table"><thead><tr><th>負責人</th><th>項目</th><th style="text-align:right">金額</th></tr></thead><tbody>`;
    if(!rows.length)html+=`<tr><td colspan="3" style="color:#b8a090;font-size:12px;padding:8px">尚無資料</td></tr>`;
    rows.forEach(r=>{html+=`<tr><td>${r.who}</td><td>${r.item}</td><td class="amount">${fmt(r.amt)}</td></tr>`;});
    html+=`</tbody></table>
      <div class="section-total"><span>合計</span><strong>${fmt(total)}</strong></div>
      <div style="text-align:right;margin-top:6px;">${growthTagDark(total,ptotal)}</div>
    </div>`;
  });
  document.getElementById('detail-content').innerHTML=html;
}

// ── 每月記帳 ──
let formRows={liquid:[],invest:[],paid:[],unpaid:[]};
function getInputMonth(){
  let y=document.getElementById('input-year').value;
  let mo=document.getElementById('input-mon').value;
  return y+'-'+String(mo).padStart(2,'0');
}
function renderForm(){
  let html='';
  CATS.forEach(c=>{
    if(!formRows[c.key]||!formRows[c.key].length)formRows[c.key]=[{who:'子萱',item:'',amt:''}];
    html+=`<div class="card">
      <div class="section-header"><span class="dot" style="background:${c.color}"></span>${c.label}${c.desc?'（'+c.desc+'）':''}</div>
      <div id="rows-${c.key}"></div>
      <button class="add-btn" onclick="addRow('${c.key}')">＋ 新增一筆</button></div>`;
  });
  document.getElementById('form-sections').innerHTML=html;
  CATS.forEach(c=>refreshRows(c.key));
}
function refreshRows(key){
  let cont=document.getElementById('rows-'+key); if(!cont)return;
  let opts=pastItems[key].map(i=>`<option value="${i}">${i}</option>`).join('');
  cont.innerHTML=formRows[key].map((r,i)=>`
    <div class="form-row">
      <select onchange="formRows['${key}'][${i}].who=this.value">
        <option value="子萱" ${r.who==='子萱'?'selected':''}>子萱</option>
        <option value="佳韋" ${r.who==='佳韋'?'selected':''}>佳韋</option>
        <option value="共同" ${r.who==='共同'?'selected':''}>共同</option>
      </select>
      <input list="list-${key}-${i}" placeholder="項目" value="${r.item}" oninput="formRows['${key}'][${i}].item=this.value">
      <datalist id="list-${key}-${i}">${opts}</datalist>
      <input type="number" placeholder="金額" value="${r.amt}" oninput="formRows['${key}'][${i}].amt=this.value">
      <button class="rm-btn" onclick="rmRow('${key}',${i})">✕</button>
    </div>`).join('');
}
function addRow(key){formRows[key].push({who:'子萱',item:'',amt:''});refreshRows(key);}
function rmRow(key,i){formRows[key].splice(i,1);if(!formRows[key].length)formRows[key]=[{who:'子萱',item:'',amt:''}];refreshRows(key);}

function showToast(msg, type='success'){
  let t=document.getElementById('toast');
  t.textContent=msg; t.className='toast '+type; t.style.display='block';
  setTimeout(()=>t.style.display='none', 3000);
}

async function saveData(){
  if(!accessToken){ showToast('請先登入','error'); return; }
  let m=getInputMonth();
  let btn=document.getElementById('save-btn');
  btn.disabled=true; btn.textContent='儲存中...';
  try{
    for(let c of CATS){
      let rows=formRows[c.key].filter(r=>r.item&&r.amt).map(r=>({month:m,who:r.who,item:r.item,amt:r.amt}));
      if(rows.length) await appendToSheet(c.key, rows);
    }
    showToast('✓ 資料已儲存！');
    formRows={liquid:[],invest:[],paid:[],unpaid:[]};
    await loadAllData();
  }catch(e){
    showToast('❌ 儲存失敗：'+e.message,'error');
  }finally{
    btn.disabled=false; btn.textContent='儲存本月資料';
  }
}
</script>
