<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>家庭財務總覽 Demo</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:system-ui,-apple-system,sans-serif;background:#f5ece0;color:#513C2C;font-size:14px;}
.app{max-width:680px;margin:0 auto;padding:16px 16px 80px;}
.page{display:none;}.page.active{display:block;}
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:680px;background:#fff8f0;border-top:1px solid #e8d8c4;display:flex;z-index:100;}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:10px 4px 8px;background:transparent;border:none;cursor:pointer;color:#a08870;font-size:11px;}
.nav-btn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;}
.nav-btn.active{color:#513C2C;font-weight:500;}
.card{background:#fff8f0;border:1px solid #e8d8c4;border-radius:14px;padding:16px 18px;margin-bottom:12px;}
.metric-row{display:grid;gap:10px;margin-bottom:12px;}
.metric-row-2{grid-template-columns:1fr 1fr;}
.metric{background:#513C2C;border-radius:10px;padding:12px 14px;}
.metric-label{font-size:11px;color:#d4b896;margin-bottom:4px;font-weight:500;text-transform:uppercase;letter-spacing:0.03em;}
.metric-value{font-size:17px;font-weight:700;color:#fff;}
.metric-growth{font-size:17px;font-weight:700;margin-top:4px;}
.growth-up{color:#c0392b;}.growth-down{color:#1a1a1a;}.growth-flat{color:#d4b896;}
.progress-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;}
.progress-title{font-size:15px;font-weight:700;color:#513C2C;}
.progress-pct{font-size:15px;color:#3d7a68;font-weight:700;}
.progress-bar-bg{height:9px;background:#e8d8c4;border-radius:99px;overflow:hidden;}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,#869D96,#5a8078);border-radius:99px;}
.progress-sub{font-size:12px;color:#8a6a52;margin-top:7px;}
.goal-row{margin-top:12px;display:flex;gap:8px;align-items:center;}
.goal-label{font-size:12px;color:#8a6a52;white-space:nowrap;font-weight:500;}
.goal-input{flex:1;font-size:13px;padding:5px 10px;height:34px;border-radius:8px;border:1px solid #d4b896;background:#f5ece0;color:#513C2C;font-weight:500;}
.goal-btn{height:34px;padding:0 14px;font-size:12px;border:1px solid #d4b896;border-radius:8px;background:transparent;cursor:pointer;color:#7a5c42;white-space:nowrap;font-weight:500;}
.goal-btn.save{background:#869D96;color:#fff;border-color:#869D96;}
.chart-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.chart-title{font-size:14px;font-weight:700;color:#513C2C;}
.seg-ctrl{display:flex;gap:2px;background:#f0e0cc;border-radius:8px;padding:2px;}
.seg-btn{font-size:11px;padding:4px 9px;border:none;background:transparent;border-radius:6px;cursor:pointer;color:#8a6a52;font-weight:500;}
.seg-btn.active{background:#fff8f0;color:#513C2C;border:1px solid #d4b896;}
.filter-row{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.filter-row select{font-size:13px;padding:6px 10px;border-radius:8px;border:1px solid #d4b896;background:#fff8f0;color:#513C2C;}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0;}
.data-table{width:100%;font-size:13px;border-collapse:collapse;}
.data-table th{text-align:left;color:#8a6a52;font-weight:500;padding:6px 8px;border-bottom:1px solid #ead8c4;font-size:12px;}
.data-table td{padding:8px;color:#513C2C;border-bottom:1px solid #f0e4d4;}
.data-table tr:last-child td{border-bottom:none;}
.data-table .amount{text-align:right;font-weight:600;white-space:nowrap;}
.section-total{display:flex;justify-content:space-between;align-items:center;background:#513C2C;border-radius:8px;padding:10px 14px;margin-top:10px;}
.section-total span{font-size:12px;color:#d4b896;font-weight:500;}
.section-total strong{font-size:16px;color:#fff;font-weight:700;}
.section-header{font-size:13px;font-weight:700;color:#7a5c42;margin-bottom:10px;display:flex;align-items:center;gap:6px;text-transform:uppercase;letter-spacing:0.04em;}
.cat-tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:14px;}
.cat-tab{padding:8px 4px;font-size:12px;font-weight:600;border:1.5px solid #d4b896;border-radius:10px;background:#fff8f0;color:#8a6a52;cursor:pointer;text-align:center;}
.month-select-row{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.month-select-row label{font-size:14px;color:#8a6a52;font-weight:500;}
.month-select-row select{font-size:13px;padding:6px 10px;border-radius:8px;border:1px solid #d4b896;background:#fff8f0;color:#513C2C;}
.entry-card{background:#fff8f0;border:1px solid #e8d8c4;border-radius:14px;padding:16px 18px;margin-bottom:12px;}
.entry-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.entry-title{font-size:13px;font-weight:700;color:#7a5c42;display:flex;align-items:center;gap:6px;text-transform:uppercase;letter-spacing:0.04em;}
.edit-btn{font-size:12px;padding:5px 12px;border:1.5px solid #869D96;border-radius:8px;background:transparent;cursor:pointer;color:#869D96;font-weight:600;}
.save-cat-btn{font-size:13px;padding:10px;border:none;border-radius:8px;background:#513C2C;cursor:pointer;color:#fff8f0;font-weight:600;width:100%;margin-top:10px;}
.add-row-btn{font-size:12px;padding:8px;border:1.5px solid #d4b896;border-radius:8px;background:transparent;cursor:pointer;color:#7a5c42;font-weight:600;width:100%;margin-top:10px;}
.entry-row{display:grid;grid-template-columns:60px 1fr auto;gap:8px;align-items:center;padding:7px 0;border-bottom:1px solid #f0e4d4;font-size:13px;}
.entry-row:last-of-type{border-bottom:none;}
.entry-who{color:#8a6a52;font-size:12px;}
.entry-amt{text-align:right;font-weight:600;white-space:nowrap;}
.edit-row{padding:8px 0;border-bottom:1px solid #f0e4d4;}
.edit-row-top{display:grid;grid-template-columns:90px 1fr;gap:8px;margin-bottom:6px;}
.edit-row-bot{display:grid;grid-template-columns:1fr 36px;gap:8px;}
.edit-row select,.edit-row input{font-size:13px;padding:6px 10px;height:36px;border:1px solid #d4b896;border-radius:8px;background:#f5ece0;color:#513C2C;width:100%;}
.new-section{margin-top:12px;padding-top:12px;border-top:1px dashed #d4b896;}
.rm-btn{width:36px;height:36px;background:transparent;border:1px solid #e8c4b0;border-radius:8px;cursor:pointer;color:#c4a080;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.no-data{color:#b8a090;font-size:13px;padding:8px 0;text-align:center;}
.toast{display:none;border-radius:10px;padding:10px 16px;font-size:14px;text-align:center;margin-top:12px;font-weight:500;background:#869D96;color:#fff;}
.demo-badge{background:#513C2C;color:#fff8f0;font-size:11px;font-weight:600;padding:3px 10px;border-radius:99px;margin-bottom:12px;display:inline-block;letter-spacing:0.05em;}
</style>
</head>
<body>
<div class="app">
  <div style="text-align:center;margin-bottom:4px;">
    <span class="demo-badge">✦ DEMO 展示版 ✦</span>
  </div>

  <!-- 首頁 -->
  <div class="page active" id="page0">
    <div class="card">
      <div class="progress-header">
        <span class="progress-title">年度存款目標</span>
        <span class="progress-pct">72%</span>
      </div>
      <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:72%"></div></div>
      <div class="progress-sub">存款 <strong>$1,440,000</strong> / 目標 <strong>$2,000,000</strong></div>
      <div class="goal-row">
        <span class="goal-label">年度目標</span>
        <input type="text" class="goal-input" value="2,000,000" readonly>
        <button class="goal-btn">✎ 編輯</button>
      </div>
    </div>
    <div class="metric-row metric-row-2">
      <div class="metric">
        <div class="metric-label">存款</div>
        <div class="metric-value">$1,440,000</div>
        <div class="metric-growth"><span class="growth-up">▲ +5% 較上月</span><br><span style="font-size:13px;font-weight:500;color:#d4b896;">+$68,000</span></div>
      </div>
      <div class="metric">
        <div class="metric-label">股票總市值</div>
        <div class="metric-value">$8,500,000</div>
        <div class="metric-growth"><span class="growth-up">▲ +38% 較上月</span><br><span style="font-size:13px;font-weight:500;color:#d4b896;">+$2,360,000</span></div>
      </div>
    </div>
    <div class="card">
      <div class="chart-header">
        <div class="chart-title">各月份花費</div>
        <div class="seg-ctrl" id="seg-paid">
          <button class="seg-btn active" onclick="setRange('paid',3,this)">近3月</button>
          <button class="seg-btn" onclick="setRange('paid',6,this)">近6月</button>
          <button class="seg-btn" onclick="setRange('paid',12,this)">近1年</button>
        </div>
      </div>
      <div style="height:200px"><canvas id="c1"></canvas></div>
    </div>
    <div class="card">
      <div class="chart-header">
        <div class="chart-title">股票市值趨勢</div>
        <div class="seg-ctrl" id="seg-invest">
          <button class="seg-btn active" onclick="setRange('invest',3,this)">近3月</button>
          <button class="seg-btn" onclick="setRange('invest',6,this)">近6月</button>
          <button class="seg-btn" onclick="setRange('invest',12,this)">近1年</button>
        </div>
      </div>
      <div style="height:180px"><canvas id="c2"></canvas></div>
    </div>
  </div>

  <!-- 明細表 -->
  <div class="page" id="page1">
    <div class="filter-row">
      <label style="color:#8a6a52;font-weight:500;">篩選月份</label>
      <select id="detail-month" onchange="renderDetail()">
        <option value="2026-04">2026年4月</option>
        <option value="2026-03">2026年3月</option>
        <option value="2026-02">2026年2月</option>
        <option value="2026-01">2026年1月</option>
        <option value="2025-12">2025年12月</option>
        <option value="2025-11">2025年11月</option>
      </select>
    </div>
    <div class="cat-tabs" id="cat-tabs"></div>
    <div id="detail-content"></div>
  </div>

  <!-- 每月記帳 -->
  <div class="page" id="page2">
    <div class="month-select-row">
      <label>記帳月份</label>
      <select id="input-year" onchange="renderFormCat()" style="font-size:13px;padding:6px 10px;border-radius:8px;border:1px solid #d4b896;background:#fff8f0;color:#513C2C;">
        <option value="2025">2025</option><option value="2026" selected>2026</option><option value="2027">2027</option>
      </select>
      <span style="color:#8a6a52;">年</span>
      <select id="input-mon" onchange="renderFormCat()" style="font-size:13px;padding:6px 10px;border-radius:8px;border:1px solid #d4b896;background:#fff8f0;color:#513C2C;">
        <option value="1">1月</option><option value="2">2月</option><option value="3">3月</option><option value="4">4月</option><option value="5" selected>5月</option><option value="6">6月</option><option value="7">7月</option><option value="8">8月</option><option value="9">9月</option><option value="10">10月</option><option value="11">11月</option><option value="12">12月</option>
      </select>
    </div>
    <div class="cat-tabs" id="form-cat-tabs"></div>
    <div id="form-cat-content"></div>
    <div class="toast" id="toast"></div>
  </div>
</div>

<div class="bottom-nav">
  <button class="nav-btn active" id="nav0" onclick="switchTab(0)">
    <svg viewBox="0 0 24 24"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>首頁
  </button>
  <button class="nav-btn" id="nav1" onclick="switchTab(1)">
    <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M7 8h10M7 12h10M7 16h6"/></svg>明細表
  </button>
  <button class="nav-btn" id="nav2" onclick="switchTab(2)">
    <svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>每月記帳
  </button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
var MTW = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
var CATS = [
  {key:'liquid', label:'流動資產', color:'#869D96', desc:'收入、存款'},
  {key:'invest', label:'投資資產', color:'#513C2C', desc:'股票市值'},
  {key:'paid',   label:'已付帳款', color:'#a0522d', desc:'卡費、管理費'},
  {key:'unpaid', label:'未付帳款', color:'#c4935a', desc:''}
];
var COLORS = {liquid:'#869D96', invest:'#513C2C', paid:'#a0522d', unpaid:'#c4935a'};
var pastItems = {
  liquid:['A - 銀行存款','B - 銀行存款','共同 - 帳戶','A - 其他存款'],
  invest:['A - ETF','A - 金融股','B - 股票'],
  paid:['管理費','信用卡費','水電費','好市多卡費'],
  unpaid:['未出帳信用卡','停車費','下期帳單']
};

var demoData = {
  '2025-11':{
    liquid:[{who:'A',item:'銀行存款',amt:320000},{who:'B',item:'銀行存款',amt:280000},{who:'共同',item:'帳戶',amt:650000}],
    invest:[{who:'A',item:'ETF',amt:980000},{who:'A',item:'金融股',amt:210000},{who:'B',item:'股票',amt:5200000}],
    paid:[{who:'A',item:'管理費',amt:3500},{who:'共同',item:'信用卡費',amt:68000},{who:'A',item:'水電費',amt:4200}],
    unpaid:[{who:'B',item:'下期帳單',amt:35000}]
  },
  '2025-12':{
    liquid:[{who:'A',item:'銀行存款',amt:355000},{who:'B',item:'銀行存款',amt:295000},{who:'共同',item:'帳戶',amt:722000}],
    invest:[{who:'A',item:'ETF',amt:1020000},{who:'A',item:'金融股',amt:225000},{who:'B',item:'股票',amt:5580000}],
    paid:[{who:'A',item:'管理費',amt:3500},{who:'共同',item:'信用卡費',amt:42000},{who:'A',item:'水電費',amt:3800}],
    unpaid:[{who:'共同',item:'未出帳信用卡',amt:28000}]
  },
  '2026-01':{
    liquid:[{who:'A',item:'銀行存款',amt:378000},{who:'B',item:'銀行存款',amt:310000},{who:'共同',item:'帳戶',amt:805000}],
    invest:[{who:'A',item:'ETF',amt:1080000},{who:'A',item:'金融股',amt:240000},{who:'B',item:'股票',amt:6150000}],
    paid:[{who:'A',item:'管理費',amt:3500},{who:'共同',item:'信用卡費',amt:55000},{who:'A',item:'水電費',amt:3600}],
    unpaid:[]
  },
  '2026-02':{
    liquid:[{who:'A',item:'銀行存款',amt:398000},{who:'B',item:'銀行存款',amt:328000},{who:'共同',item:'帳戶',amt:860000}],
    invest:[{who:'A',item:'ETF',amt:1120000},{who:'A',item:'金融股',amt:255000},{who:'B',item:'股票',amt:6480000}],
    paid:[{who:'A',item:'管理費',amt:3500},{who:'共同',item:'信用卡費',amt:38000},{who:'A',item:'水電費',amt:3900}],
    unpaid:[{who:'共同',item:'停車費',amt:15000}]
  },
  '2026-03':{
    liquid:[{who:'A',item:'銀行存款',amt:412000},{who:'B',item:'銀行存款',amt:342000},{who:'共同',item:'帳戶',amt:918000}],
    invest:[{who:'A',item:'ETF',amt:1180000},{who:'A',item:'金融股',amt:268000},{who:'B',item:'股票',amt:6900000}],
    paid:[{who:'A',item:'管理費',amt:3500},{who:'共同',item:'信用卡費',amt:72000},{who:'A',item:'好市多卡費',amt:8500}],
    unpaid:[{who:'B',item:'下期帳單',amt:22000}]
  },
  '2026-04':{
    liquid:[{who:'A',item:'銀行存款',amt:438000},{who:'B',item:'銀行存款',amt:358000},{who:'共同',item:'帳戶',amt:980000},{who:'A',item:'其他存款',amt:64000}],
    invest:[{who:'A',item:'ETF',amt:1250000},{who:'A',item:'金融股',amt:280000},{who:'B',item:'股票',amt:6970000}],
    paid:[{who:'A',item:'管理費',amt:3500},{who:'共同',item:'信用卡費',amt:61000},{who:'A',item:'水電費',amt:4100},{who:'共同',item:'好市多卡費',amt:11000}],
    unpaid:[]
  }
};

var ALL_MONTHS = Object.keys(demoData).sort();
var activeCat = 'liquid', activeFormCat = 'liquid';
var editMode = {liquid:false, invest:false, paid:false, unpaid:false};
var editRows = {liquid:[], invest:[], paid:[], unpaid:[]};
var newRows = {liquid:[], invest:[], paid:[], unpaid:[]};
var charts = {c1:null, c2:null};
var ranges = {paid:3, invest:3};

function s(arr,k){return (arr||[]).reduce(function(a,b){return a+(+b[k]||0);},0);}
function fmt(n){return '$'+Math.round(n).toLocaleString();}
function mLabel(m){var p=m.split('-');return p[0]+'年'+MTW[+p[1]-1];}
function prevMonth(m){var i=ALL_MONTHS.indexOf(m);return i>0?ALL_MONTHS[i-1]:null;}
function getSurplus(m){var d=demoData[m]||{};return s(d.liquid,'amt')-s(d.unpaid,'amt');}
function getInputMonth(){
  var y=document.getElementById('input-year').value;
  var mo=String(document.getElementById('input-mon').value).padStart(2,'0');
  return y+'-'+mo;
}

function growthTag(cur,prev){
  if(prev===null||prev===undefined)return '<span class="growth-flat">— 無前月資料</span>';
  if(prev===0)return '<span class="growth-flat">—</span>';
  var pct=(cur-prev)/prev*100,sign=pct>=0?'+':'';
  var cls=pct>0?'growth-up':pct<0?'growth-down':'growth-flat';
  var arrow=pct>0?'▲':pct<0?'▼':'—';
  var diff=cur-prev, diffStr=(diff>=0?'+':'')+fmt(diff);
  return '<span class="'+cls+'">'+arrow+' '+sign+Math.round(pct)+'% 較上月</span><br><span style="font-size:13px;font-weight:500;color:#d4b896;">'+diffStr+'</span>';
}
function growthTagDark(cur,prev){
  if(prev===null||prev===undefined)return '<span style="color:#a08870;font-size:13px;font-weight:600;">— 無前月資料</span>';
  if(prev===0)return '<span style="color:#a08870;font-size:13px;">—</span>';
  var pct=(cur-prev)/prev*100,sign=pct>=0?'+':'';
  var color=pct>0?'#c0392b':'#1a1a1a';
  var arrow=pct>0?'▲':'▼';
  var diff=cur-prev, diffStr=(diff>=0?'+':'')+fmt(diff);
  return '<span style="color:'+color+';font-size:13px;font-weight:600;">'+arrow+' '+sign+Math.round(pct)+'% 較上月</span> <span style="color:#7a5c42;font-size:12px;font-weight:500;">（'+diffStr+'）</span>';
}

function switchTab(i){
  [0,1,2].forEach(function(j){
    document.getElementById('page'+j).classList.toggle('active',j===i);
    document.getElementById('nav'+j).classList.toggle('active',j===i);
  });
  if(i===1)renderDetail();
  if(i===2)renderFormCat();
}

function setRange(type,n,btn){
  ranges[type]=n;
  document.querySelectorAll('#seg-'+type+' .seg-btn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  if(type==='paid')rebuildC1();else rebuildC2();
}

function getMonths(n){
  var e=ALL_MONTHS.length-1,st=Math.max(0,e-n+1);
  return ALL_MONTHS.slice(st,e+1);
}

function rebuildC1(){
  if(charts.c1)charts.c1.destroy();
  var months=getMonths(ranges.paid),labels=months.map(mLabel);
  var paid=months.map(function(m){return s((demoData[m]||{}).paid,'amt');});
  charts.c1=new Chart(document.getElementById('c1'),{
    type:'bar',
    data:{labels:labels,datasets:[{data:paid,backgroundColor:'rgba(160,82,45,0.7)',borderRadius:6,borderSkipped:false}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{
      y:{ticks:{callback:function(v){return '$'+(v/10000).toFixed(0)+'萬';},font:{size:11},color:'#8a6a52'},grid:{color:'rgba(81,60,44,0.06)'},beginAtZero:true,border:{display:false}},
      x:{ticks:{font:{size:11},color:'#8a6a52',autoSkip:false,maxRotation:45},grid:{display:false},border:{display:false}}
    }}
  });
}
function rebuildC2(){
  if(charts.c2)charts.c2.destroy();
  var months=getMonths(ranges.invest),labels=months.map(mLabel);
  var invest=months.map(function(m){return s((demoData[m]||{}).invest,'amt');});
  charts.c2=new Chart(document.getElementById('c2'),{
    type:'line',
    data:{labels:labels,datasets:[{data:invest,borderColor:'#869D96',backgroundColor:'rgba(134,157,150,0.1)',tension:0.4,fill:true,borderWidth:2.5,pointRadius:4,pointBackgroundColor:'#869D96'}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{
      y:{ticks:{callback:function(v){return '$'+(v/10000).toFixed(0)+'萬';},font:{size:11},color:'#8a6a52'},grid:{color:'rgba(81,60,44,0.06)'},border:{display:false}},
      x:{ticks:{font:{size:11},color:'#8a6a52',autoSkip:false,maxRotation:45},grid:{display:false},border:{display:false}}
    }}
  });
}

function renderCatTabs(){
  document.getElementById('cat-tabs').innerHTML=CATS.map(function(c){
    var a=activeCat===c.key;
    return '<button class="cat-tab'+(a?' active':'')+'" style="'+(a?'background:'+c.color+';color:#fff8f0;border-color:transparent;':'')+'" onclick="switchCat(\''+c.key+'\')">'+c.label+'</button>';
  }).join('');
}
function switchCat(key){activeCat=key;renderCatTabs();renderDetail();}

function renderDetail(){
  var m=document.getElementById('detail-month').value;
  var prev=prevMonth(m),d=demoData[m]||{},dp=prev&&demoData[prev]?demoData[prev]:{};
  var c=CATS.find(function(x){return x.key===activeCat;});
  var rows=d[c.key]||[],total=s(rows,'amt');
  var ptotal=prev?s((dp[c.key]||[]),'amt'):null;
  var html='<div class="card"><div class="section-header"><span class="dot" style="background:'+c.color+'"></span>'+c.label+(c.desc?'（'+c.desc+'）':'')+'</div>';
  html+='<table class="data-table"><thead><tr><th>負責人</th><th>項目</th><th style="text-align:right">金額</th></tr></thead><tbody>';
  if(!rows.length)html+='<tr><td colspan="3" style="color:#b8a090;font-size:12px;padding:8px;text-align:center;">尚無資料</td></tr>';
  rows.forEach(function(r){html+='<tr><td>'+r.who+'</td><td>'+r.item+'</td><td class="amount">'+fmt(r.amt)+'</td></tr>';});
  html+='</tbody></table><div class="section-total"><span>合計</span><strong>'+fmt(total)+'</strong></div>';
  html+='<div style="text-align:right;margin-top:6px;">'+growthTagDark(total,ptotal)+'</div></div>';
  document.getElementById('detail-content').innerHTML=html;
}

function renderFormCatTabs(){
  document.getElementById('form-cat-tabs').innerHTML=CATS.map(function(c){
    var a=activeFormCat===c.key;
    return '<button class="cat-tab'+(a?' active':'')+'" style="'+(a?'background:'+c.color+';color:#fff8f0;border-color:transparent;':'')+'" onclick="switchFormCat(\''+c.key+'\')">'+c.label+'</button>';
  }).join('');
}
function switchFormCat(key){
  activeFormCat=key;editMode[key]=false;newRows[key]=[];
  renderFormCatTabs();renderFormCat();
}

function renderFormCat(){
  var key=activeFormCat;
  var c=CATS.find(function(x){return x.key===key;});
  var m=getInputMonth();
  var existing=(demoData[m]||{})[key]||[];
  var isEdit=editMode[key];
  var existingHtml='';

  if(!existing.length){
    existingHtml='<p class="no-data">本月尚無資料</p>';
  } else if(isEdit){
    existingHtml=editRows[key].map(function(r,i){
      var opts=pastItems[key].map(function(x){return '<option value="'+x+'">';}).join('');
      return '<div class="edit-row"><div class="edit-row-top">'+
        '<select onchange="editRows[\''+key+'\']['+i+'].who=this.value">'+
        '<option value="A"'+(r.who==='A'?' selected':'')+'>A</option>'+
        '<option value="B"'+(r.who==='B'?' selected':'')+'>B</option>'+
        '<option value="共同"'+(r.who==='共同'?' selected':'')+'>共同</option></select>'+
        '<input list="el-'+key+'-'+i+'" placeholder="項目" value="'+r.item+'" oninput="editRows[\''+key+'\']['+i+'].item=this.value">'+
        '<datalist id="el-'+key+'-'+i+'">'+opts+'</datalist></div>'+
        '<div class="edit-row-bot"><input type="number" placeholder="金額" value="'+r.amt+'" oninput="editRows[\''+key+'\']['+i+'].amt=this.value">'+
        '<button class="rm-btn" onclick="removeEditRow(\''+key+'\','+i+')">✕</button></div></div>';
    }).join('');
  } else {
    existingHtml=existing.map(function(r){
      return '<div class="entry-row"><span class="entry-who">'+r.who+'</span><span class="entry-item">'+r.item+'</span><span class="entry-amt">'+fmt(r.amt)+'</span></div>';
    }).join('');
  }

  var newHtml='';
  if(newRows[key].length){
    newHtml='<div class="new-section">'+newRows[key].map(function(r,i){
      var opts=pastItems[key].map(function(x){return '<option value="'+x+'">';}).join('');
      return '<div class="edit-row"><div class="edit-row-top">'+
        '<select onchange="newRows[\''+key+'\']['+i+'].who=this.value">'+
        '<option value="A">A</option><option value="B">B</option><option value="共同">共同</option></select>'+
        '<input list="nl-'+key+'-'+i+'" placeholder="項目" value="'+r.item+'" oninput="newRows[\''+key+'\']['+i+'].item=this.value">'+
        '<datalist id="nl-'+key+'-'+i+'">'+opts+'</datalist></div>'+
        '<div class="edit-row-bot"><input type="number" placeholder="金額" value="'+r.amt+'" oninput="newRows[\''+key+'\']['+i+'].amt=this.value">'+
        '<button class="rm-btn" onclick="removeNewRow(\''+key+'\','+i+')">✕</button></div></div>';
    }).join('')+'</div>';
  }

  var showSave=isEdit||newRows[key].length>0;
  document.getElementById('form-cat-content').innerHTML=
    '<div class="entry-card"><div class="entry-header">'+
    '<div class="entry-title"><span class="dot" style="background:'+c.color+'"></span>'+c.label+'</div>'+
    '<div>'+(existing.length?'<button class="edit-btn" onclick="toggleEdit(\''+key+'\')">'+（isEdit?'取消':'✎ 編輯')+'</button>':'')+
    '</div></div>'+existingHtml+newHtml+
    '<button class="add-row-btn" onclick="addNewRow(\''+key+'\')">＋ 新增一筆</button>'+
    (showSave?'<button class="save-cat-btn" onclick="saveDemo()">儲存</button>':'')+
    '</div>';
}

function toggleEdit(key){
  var m=getInputMonth();
  var existing=(demoData[m]||{})[key]||[];
  if(!editMode[key])editRows[key]=existing.map(function(r){return {who:r.who,item:r.item,amt:r.amt};});
  editMode[key]=!editMode[key];
  renderFormCat();
}
function removeEditRow(key,i){editRows[key].splice(i,1);renderFormCat();}
function addNewRow(key){newRows[key].push({who:'A',item:'',amt:''});renderFormCat();}
function removeNewRow(key,i){newRows[key].splice(i,1);renderFormCat();}
function saveDemo(){
  var t=document.getElementById('toast');
  t.textContent='✓ Demo 模式：資料不會真的儲存';
  t.style.display='block';
  setTimeout(function(){t.style.display='none';},3000);
  editMode[activeFormCat]=false;
  newRows[activeFormCat]=[];
  renderFormCat();
}

// 初始化
renderCatTabs();
renderFormCatTabs();
renderDetail();
renderFormCat();
rebuildC1();
rebuildC2();
</script>
</body>
</html>
